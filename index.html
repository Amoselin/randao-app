<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燃道 Randao | 燃起微光，看見歸途</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;500&family=Noto+Serif+TC:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            --main-green: #2d3e2a;   /* 鬱而舒 主色 */
            --bg-sand: #d2c7a9;      /* 鬱而舒 底色 */
            --accent-gold: #b3a04a;  /* 鬱而舒 點綴金色 */
            --glass-white: rgba(255, 255, 255, 0.4);
            --text-ink: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--bg-sand); 
            font-family: 'Noto Serif TC', serif;
            color: var(--main-green);
            overflow: hidden;
        }

        #app { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* --- 核心 UI 組件 --- */
        .glass-panel {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(45, 62, 42, 0.08);
        }

        .btn-main {
            background: var(--main-green);
            color: var(--bg-sand);
            border: none;
            padding: 20px 45px;
            border-radius: 60px;
            font-size: 1rem;
            letter-spacing: 6px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Noto Serif TC', serif;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        .btn-ghost {
            background: transparent;
            color: var(--main-green);
            border: 1px solid var(--main-green);
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            cursor: pointer;
            margin: 8px;
        }

        /* --- 視圖 1：品牌首頁 (東方意境) --- */
        .view-landing {
            height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 100px 40px 80px;
            background: radial-gradient(circle at center, rgba(179, 160, 74, 0.15) 0%, rgba(210, 199, 169, 0) 70%);
        }
        .brand-header { text-align: center; }
        .brand-logo { font-size: 3.2rem; font-weight: 200; letter-spacing: 20px; margin-bottom: 20px; }
        .slogan-group { text-align: center; animation: fadeIn 2s ease; }
        .slogan-zh { font-size: 1.2rem; letter-spacing: 12px; margin-bottom: 10px; font-weight: 400; }
        .slogan-en { font-family: 'Outfit', sans-serif; font-size: 0.65rem; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }

        /* --- 視圖 2：五常選擇 --- */
        .view-selection { padding: 80px 30px; height: 100%; display: flex; flex-direction: column; }
        .page-title { font-size: 1.8rem; font-weight: 400; margin-bottom: 40px; letter-spacing: 4px; }
        .virtue-card {
            padding: 40px 30px; margin-bottom: 20px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .virtue-info h3 { margin: 0; font-size: 1.4rem; letter-spacing: 4px; color: var(--main-green); }
        .virtue-info p { margin: 8px 0 0; font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; }
        .gold-tag { background: var(--accent-gold); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.7rem; }

        /* --- 視圖 3：冥想計時器 (15分鐘) --- */
        .view-active { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .timer-wrapper {
            width: 300px; height: 300px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative; margin-bottom: 60px;
        }
        .timer-display { font-family: 'Outfit', sans-serif; font-size: 4.5rem; font-weight: 200; letter-spacing: -2px; }
        .status-dot { width: 6px; height: 6px; background: var(--accent-gold); border-radius: 50%; margin-top: 20px; animation: breathe 3s infinite; }

        /* --- 視圖 4：完成結算 --- */
        .view-finish {
            height: 100%; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: var(--main-green); color: var(--bg-sand);
        }
        .stat-circle { width: 120px; height: 120px; border: 1px solid var(--bg-sand); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; margin-bottom: 30px; }

        /* --- 動畫效果 --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes breathe { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.8s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <transition name="fade">
        <div v-if="view === 'landing'" class="view-landing">
            <div class="brand-header">
                <div class="brand-logo">燃道</div>
                <div class="slogan-group">
                    <div class="slogan-zh">燃起微光，看見歸途</div>
                    <div class="slogan-en">A faint light kindled, the way back revealed.</div>
                </div>
            </div>
            <button class="btn-main" @click="view = 'selection'">開始冥想</button>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'selection'" class="view-selection">
            <h2 class="page-title">修行計畫</h2>
            <div class="glass-panel virtue-card" @click="startMeditation">
                <div class="virtue-info">
                    <div class="gold-tag" style="display:inline-block; margin-bottom:10px;">五常 · 煉</div>
                    <h3>鬱而舒</h3>
                    <p>疏通情緒阻塞，尋回內心明亮</p>
                </div>
                <div style="font-size: 1.5rem; color: var(--accent-gold);">→</div>
            </div>
            <button class="btn-ghost" style="margin-top: auto; align-self: center;" @click="view = 'landing'">返回首頁</button>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'active'" class="view-active">
            <div style="font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 40px; opacity: 0.7;">正在練習：鬱而舒</div>
            <div class="glass-panel timer-wrapper">
                <div class="timer-display">{{ formatTime(timer) }}</div>
                <div class="status-dot"></div>
            </div>
            <div style="display: flex;">
                <button class="btn-ghost" @click="togglePause">{{ isPaused ? '繼續' : '暫停' }}</button>
                <button class="btn-ghost" style="opacity: 0.5;" @click="stopMeditation">停止</button>
            </div>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'finish'" class="view-finish">
            <div class="stat-circle">{{ sessions }}</div>
            <div style="letter-spacing: 8px; font-size: 1.2rem; margin-bottom: 10px;">歸途已現</div>
            <div style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px;">這是您第 {{ sessions }} 次點燃微光</div>
            <button class="btn-main" style="background: var(--bg-sand); color: var(--main-green); margin-top: 60px;" @click="view = 'landing'">圓滿退出</button>
        </div>
    </transition>
</div>

<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const view = ref('landing');
            const timer = ref(900); // 15分鐘
            const isPaused = ref(false);
            const sessions = ref(Number(localStorage.getItem('rd_count') || 0));
            let interval = null;

            const formatTime = (s) => {
                const m = Math.floor(s / 60);
                const secs = s % 60;
                return `${m}:${secs.toString().padStart(2, '0')}`;
            };

            const startMeditation = () => {
                view.value = 'active';
                timer.value = 900;
                isPaused.value = false;
                runInterval();
            };

            const runInterval = () => {
                if (interval) clearInterval(interval);
                interval = setInterval(() => {
                    if (!isPaused.value) {
                        if (timer.value > 0) timer.value--;
                        else finishMeditation();
                    }
                }, 1000);
            };

            const togglePause = () => { isPaused.value = !isPaused.value; };

            const stopMeditation = () => {
                if (confirm("確定要中止目前的冥想並重置時間嗎？")) {
                    clearInterval(interval);
                    timer.value = 900;
                    view.value = 'selection';
                }
            };

            const finishMeditation = () => {
                clearInterval(interval);
                sessions.value++;
                localStorage.setItem('rd_count', sessions.value);
                view.value = 'finish';
            };

            return { view, timer, isPaused, sessions, formatTime, startMeditation, togglePause, stopMeditation };
        }
    }).mount('#app');
</script>
</body>
</html>
