<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>燃道 Randao | 溫柔覺醒</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root {
            /* 鬱而舒 專屬配色方案 */
            --main-green: #2d3e2a;
            --bg-sand: #d2c7a9;
            --accent-gold: #b3a04a;
            --card-glass: rgba(255, 255, 255, 0.25);
            --text-on-sand: #2d3e2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--bg-sand); 
            font-family: 'Outfit', 'Noto Serif TC', serif;
            color: var(--main-green);
            overflow: hidden;
        }

        #app { height: 100%; display: flex; flex-direction: column; position: relative; }

        /* --- 視覺風格元件 --- */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(45, 62, 42, 0.1);
        }

        .btn-primary {
            background: var(--main-green);
            color: var(--bg-sand);
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
        }

        .btn-outline {
            background: transparent;
            color: var(--main-green);
            border: 2px solid var(--main-green);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            margin: 10px;
        }

        /* --- 第一頁：燃道視覺 --- */
        .view-start {
            height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(180deg, rgba(210, 199, 169, 0) 0%, rgba(179, 160, 74, 0.2) 100%);
            text-align: center;
        }
        .logo-container { margin-bottom: 60px; }
        .logo-text { font-size: 3.5rem; letter-spacing: 15px; font-weight: 200; color: var(--main-green); }
        .logo-sub { font-size: 0.8rem; letter-spacing: 8px; opacity: 0.7; margin-top: 10px; }

        /* --- 第二頁：五常選擇 --- */
        .view-selection {
            padding: 60px 30px; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
        }
        .section-label { font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 20px; opacity: 0.6; }
        .btn-virtue {
            background: var(--card-glass);
            padding: 30px; border-radius: 25px; border: 1px solid var(--accent-gold);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s;
        }
        .btn-virtue:active { transform: scale(0.98); background: rgba(179, 160, 74, 0.1); }
        .virtue-title { font-size: 1.4rem; font-family: 'Noto Serif TC', serif; color: var(--main-green); }
        .virtue-tag { font-size: 0.7rem; color: var(--accent-gold); border: 1px solid var(--accent-gold); padding: 2px 8px; border-radius: 4px; }

        /* --- 第三頁：冥想進行中 --- */
        .view-active {
            height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .timer-circle {
            width: 280px; height: 280px; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid rgba(45, 62, 42, 0.1);
            position: relative; margin-bottom: 50px;
        }
        .timer-val { font-size: 4rem; font-weight: 300; letter-spacing: -2px; }
        .meditation-name { font-size: 1.2rem; letter-spacing: 10px; margin-bottom: 40px; color: var(--accent-gold); }

        /* --- 第四頁：完成頁面 --- */
        .view-finish {
            height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--main-green); color: var(--bg-sand); text-align: center;
        }
        .count-badge { font-size: 0.8rem; letter-spacing: 2px; border: 1px solid var(--bg-sand); padding: 5px 15px; border-radius: 20px; margin-top: 20px; }

        /* 動畫過渡 */
        .fade-enter-active, .fade-leave-active { transition: opacity 0.6s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>

<div id="app">
    <transition name="fade">
        <div v-if="view === 'start'" class="view-start">
            <div class="logo-container">
                <div class="logo-text">燃道</div>
                <div class="logo-sub">RANDAO MEDITATION</div>
            </div>
            <button class="btn-primary" @click="view = 'selection'">開始冥想</button>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'selection'" class="view-selection">
            <div class="section-label">專屬修行計畫</div>
            <div class="btn-virtue" @click="startMeditation">
                <div>
                    <div class="virtue-title">五常·煉｜鬱而舒</div>
                    <div style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">疏肝解鬱 · 溫柔覺醒</div>
                </div>
                <div class="virtue-tag">煉</div>
            </div>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'active'" class="view-active">
            <div class="meditation-name">鬱而舒</div>
            <div class="timer-circle glass-card">
                <div class="timer-val">{{ formatTime(timer) }}</div>
                <div style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px;">{{ isPaused ? '已暫停' : '深呼吸...' }}</div>
            </div>
            <div style="display: flex;">
                <button class="btn-outline" @click="togglePause">{{ isPaused ? '繼續冥想' : '暫停冥想' }}</button>
                <button class="btn-outline" style="border-color: #888; color: #888;" @click="stopMeditation">停止冥想</button>
            </div>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="view === 'finish'" class="view-finish">
            <div style="font-size: 3rem; margin-bottom: 20px;">🪷</div>
            <h2 style="letter-spacing: 10px; font-weight: 400;">圓滿完成</h2>
            <p style="opacity: 0.8; letter-spacing: 2px;">心靈已得到片刻舒展</p>
            <div class="count-badge">累計冥想次數：{{ sessions }} 次</div>
            <button class="btn-primary" style="background: var(--bg-sand); color: var(--main-green); margin-top: 50px;" @click="view = 'start'">回到首頁</button>
        </div>
    </transition>
</div>

<script>
    const { createApp, ref, onMounted } = Vue;
    createApp({
        setup() {
            const view = ref('start'); // 狀態：start, selection, active, finish
            const timer = ref(900); // 15分鐘 = 900秒
            const isPaused = ref(false);
            const sessions = ref(Number(localStorage.getItem('rd_session_count') || 0));
            let interval = null;

            const formatTime = (s) => {
                const mins = Math.floor(s / 60);
                const secs = s % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const startMeditation = () => {
                view.value = 'active';
                timer.value = 900;
                isPaused.value = false;
                runTimer();
            };

            const runTimer = () => {
                if (interval) clearInterval(interval);
                interval = setInterval(() => {
                    if (!isPaused.value) {
                        if (timer.value > 0) {
                            timer.value--;
                        } else {
                            completeMeditation();
                        }
                    }
                }, 1000);
            };

            const togglePause = () => {
                isPaused.value = !isPaused.value;
            };

            const stopMeditation = () => {
                if (confirm("確定要停止並重新開始嗎？")) {
                    clearInterval(interval);
                    timer.value = 900; // 重新從15分鐘開始
                    view.value = 'selection';
                }
            };

            const completeMeditation = () => {
                clearInterval(interval);
                sessions.value++;
                localStorage.setItem('rd_session_count', sessions.value);
                view.value = 'finish';
            };

            return { view, timer, isPaused, sessions, formatTime, startMeditation, togglePause, stopMeditation };
        }
    }).mount('#app');
</script>
</body>
</html>
